name: Build & Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchains
        run: sudo apt-get update && sudo apt-get install -y mingw-w64 nsis

      - name: Build for production
        run: bash ./build.sh ${{ github.ref_name }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: jeode ${{ github.ref_name }}
          draft: true
          body: |


            WARNING: If you are using Windows Defender, Avast, AVG, or potentially other AVs the installer may fail to download or be detected as a virus.
            Jeode is not a virus, although some methods in Jeode may resemble malicious techniques by AV algorithms. To remedy this, you may need to add Jeode, or the My Singing Monsters folder to your exclusions.

            The latest jeode builds can be found below in the assets section:
          files: |
            build/jeode-installer.exe
            build/winhttp.dll
            build/jeode/libjeode.dll
