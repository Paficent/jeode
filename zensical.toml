[project]
site_name = "Jeode"
site_description = "Mod loader & framework for My Singing Monsters PC."
site_url = "https://paficent.github.io/jeode/"
copyright = "Copyright &copy; 2026 Paficent"

repo_url = "https://github.com/Paficent/jeode"
repo_name = "Paficent/jeode"
edit_uri = "edit/main/docs/"

extra_css = ["assets/extra.css"]

# navigation
nav = [
  { "Home" = "index.md" },
  { "Getting Started" = [
      {"Installation" = "start/installation.md"},
      { "Your First Mod" = "start/first-mod.md" },
      { "Mod Structures" = "start/structures.md" }
  ]},
  { "Configuration" = [
      { "manifest.json" = "config/manifest.md" },
      { "config.json" = "config/config.md" }
  ]},
  { "API Reference" = [
      { "Overview" = "api/index.md" },
      { "Lua API" = [
          { "Overview" = "api/lua/index.md" },
          { "console" = "api/lua/console.md" },
          { "fs" = "api/lua/fs.md" },
          { "jeode" = "api/lua/jeode.md" },
          { "net" = "api/lua/net.md" },
          { "task" = "api/lua/task.md" },
          { "ui" = [
              { "Overview" = "api/lua/ui/index.md" },
              { "State" = "api/lua/ui/state.md" },
              { "Containers" = "api/lua/ui/containers.md" },
              { "Widgets" = "api/lua/ui/widgets.md" },
              { "Layout" = "api/lua/ui/layout.md" },

          ]},
      ]},
      { "Native API" = "api/native.md" },
  ] },
  { "Community" = [
      { "Support" = "community/index.md" },
      { "Ecosystem" = "community/ecosystem.md" },
      { "Featured Projects" = "community/featured.md" }
  ] },
]

# theme
[project.theme]
variant = "modern"
logo = "assets/logo.png"
favicon = "assets/favicon.ico"
features = [
  "announce.dismiss",
  "content.action.edit",
  "content.action.view",
  "content.code.annotate",
  "content.code.copy",
  "content.code.select",
  "content.footnote.tooltips",
  "content.tabs.link",
  "content.tooltips",
  "navigation.tabs",
  "navigation.tabs.sticky",
  "navigation.sections",
  "navigation.path",
  "navigation.indexes",
  "navigation.top",
  "navigation.footer",
  "navigation.instant",
  "navigation.instant.prefetch",
  "navigation.instant.progress",
  "toc.follow",
  "search.highlight",
  "search.suggest",
]

[project.theme.icon]
repo = "fontawesome/brands/github"


# pallete
[[project.theme.palette]]
media = "(prefers-color-scheme)"
toggle.icon = "lucide/sun-moon"
toggle.name = "Switch to light mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "deep purple"
accent = "purple"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "deep purple"
accent = "purple"
toggle.icon = "lucide/moon-star"
toggle.name = "Switch to system preference"


# footer
[project.extra]
generator = false

[[project.extra.social]]
icon = "simple/gamebanana"
link = "https://gamebanana.com/tools/22237"

[[project.extra.social]]
icon = "fontawesome/brands/discord"
link = "https://discord.gg/8z6EUCJNzk"

[[project.extra.social]]
icon = "simple/codeberg"
link = "https://codeberg.org/Paficent/jeode"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/Paficent/jeode"


# markdown extensions
[project.markdown_extensions.abbr]
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]

[project.markdown_extensions.toc]
permalink = true

[project.markdown_extensions.pymdownx.betterem]
smart_enable = "all"

[project.markdown_extensions.pymdownx.caret]
[project.markdown_extensions.pymdownx.mark]
[project.markdown_extensions.pymdownx.tilde]
[project.markdown_extensions.pymdownx.details]

[project.markdown_extensions.pymdownx.emoji]
emoji_index = "zensical.extensions.emoji.twemoji"
emoji_generator = "zensical.extensions.emoji.to_svg"

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true

[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.keys]

[project.markdown_extensions.pymdownx.magiclink]
repo_url_shorthand = true
normalize_issue_symbols = true
user = "Paficent"
repo = "jeode"

[project.markdown_extensions.pymdownx.smartsymbols]
[project.markdown_extensions.pymdownx.snippets]

[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" }
]

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
combine_header_slug = true

[project.markdown_extensions.pymdownx.tabbed.slugify]
object = "pymdownx.slugs.slugify"
kwds = { case = "lower" }

[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true
